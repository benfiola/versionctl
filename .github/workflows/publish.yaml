name: publish
on:
  push:
    branches:
      - main
      - dev

jobs:
  version:
    concurrency:
      group: ${{github.workflow}}-version
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    outputs:
      version: ${{steps.version.outputs.version}}
      tag: ${{steps.version.outputs.tag}}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: version
        id: version
        run: |
          python -m pip install -e ".[dev]"
          version="$(versionctl next)"
          tag="$(versionctl convert "${version}" git)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
      - name: tag
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{steps.version.outputs.tag}}',
              sha: context.sha
            })

  build:
    needs: version
    strategy:
      matrix:
        os:
          - name: linux
            runs-on: ubuntu-20.04
          - name: darwin
            runs-on: macos-14
        arch: [arm64, amd64]
    runs-on: ${{matrix.os.runs-on}}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: qemu (linux)
        if: ${{matrix.os.name == 'linux'}}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: amd64 brew (darwin)
        if: ${{matrix.os.name == 'darwin' && matrix.arch == 'amd64' }}
        run: |
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/uninstall.sh)"
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

      - name: build
        run: |
          if [ "${{matrix.os.name}}" == "linux" ]; then
            docker run \
              --platform "linux/${{matrix.arch}}" \
              --env GITHUB_OUTPUT="${GITHUB_OUTPUT}" \
              --volume "${{github.workspace}}:${{github.workspace}}" \
              --volume "${GITHUB_OUTPUT}:${GITHUB_OUTPUT}" \
              --workdir "${{github.workspace}}" \
              --env arch="${arch}" \
              --env os="${os}" \
              --env version="${version}" \
              ubuntu:20.04 \
              .github/workflows/publish-build.sh
          elif [ "${{matrix.os.name}}" == "darwin" ]; then
            if [ "${{matrix.arch}}" == "arm64" ]; then
              arch_val="arm64"
            elif [ "${{matrix.arch}}" == "amd64" ]; then
              arch_val="x86_64"
            else
              1>&2 echo "not implemented: ${{matrix.arch}}"
            fi
            arch -"${arch_val}" .github/workflows/publish-build.sh
          else
            1>&2 echo "not implemented: ${{matrix.os.name}}"
            exit 1
          fi
        env:
          os: ${{matrix.os.name}}
          arch: ${{matrix.arch}}
          version: ${{needs.version.outputs.version}}
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: devtools-${{matrix.os.name}}-${{matrix.arch}}
          path: build/versionctl-${{matrix.os.name}}-${{matrix.arch}}

  publish:
    runs-on: ubuntu-latest
    needs: [version, build]
    permissions:
      contents: write
      id-token: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: devtools-*
          merge-multiple: true
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
          make_latest: ${{github.ref == 'refs/heads/main'}}
          prerelease: ${{github.ref != 'refs/heads/main'}}
          tag_name: ${{needs.version.outputs.tag}}
          target_commitish: ${{github.sha}}
